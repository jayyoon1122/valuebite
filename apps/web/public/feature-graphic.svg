<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="2" fill="white"/>
    <circle cx="200" cy="80" r="2" fill="white"/>
    <circle cx="300" cy="120" r="2" fill="white"/>
    <circle cx="400" cy="60" r="2" fill="white"/>
    <circle cx="900" cy="100" r="2" fill="white"/>
    <circle cx="850" cy="180" r="2" fill="white"/>
    <circle cx="950" cy="250" r="2" fill="white"/>
    <circle cx="100" cy="400" r="2" fill="white"/>
    <circle cx="200" cy="450" r="2" fill="white"/>
    <circle cx="50" cy="300" r="2" fill="white"/>
  </g>

  <!-- Left: Logo + tagline -->
  <g transform="translate(60, 110)">
    <!-- Logo circle -->
    <circle cx="60" cy="60" r="60" fill="url(#logoBg)" filter="url(#shadow)"/>
    <circle cx="60" cy="60" r="44" fill="white" opacity="0.95"/>
    <path d="M 36 36 L 60 96 L 84 36" stroke="#15803d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Brand name -->
    <text x="150" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="white">ValueBite</text>
    <text x="150" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="500" fill="#86efac">Smart Budget Dining</text>
  </g>

  <!-- Tagline -->
  <text x="60" y="290" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="white">Find the best-value</text>
  <text x="60" y="334" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="#86efac">restaurants near you</text>

  <!-- Stats row -->
  <g transform="translate(60, 380)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#86efac" letter-spacing="2">28 COUNTRIES  ·  67 CITIES  ·  AI-POWERED</text>
  </g>

  <!-- Right side: phone mockup -->
  <g transform="translate(680, 50)">
    <!-- Phone outline -->
    <rect x="0" y="0" width="240" height="400" rx="32" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
    <rect x="8" y="8" width="224" height="384" rx="26" fill="#0a0a0a"/>

    <!-- Status bar -->
    <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="white">9:41</text>
    <circle cx="218" cy="28" r="3" fill="white"/>
    <rect x="200" y="24" width="14" height="8" rx="2" fill="white"/>

    <!-- App header -->
    <text x="20" y="62" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="white">ValueBite</text>
    <circle cx="218" cy="58" r="6" fill="#22c55e"/>

    <!-- Restaurant card 1 -->
    <g transform="translate(16, 90)">
      <rect width="208" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
      <text x="14" y="22" font-size="20">🍣</text>
      <text x="44" y="24" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="white">Sushiro</text>
      <text x="44" y="38" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Conveyor Sushi</text>
      <rect x="160" y="14" width="42" height="18" rx="9" fill="#22c55e"/>
      <text x="167" y="27" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="white">★ 4.7</text>
      <text x="14" y="62" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="white">¥150</text>
      <text x="48" y="62" font-family="-apple-system, sans-serif" font-size="9" fill="#888">/person  ·  7.8km</text>
      <text x="14" y="74" font-family="-apple-system, sans-serif" font-size="9" fill="#22c55e">Great Value</text>
    </g>

    <!-- Restaurant card 2 -->
    <g transform="translate(16, 184)">
      <rect width="208" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
      <text x="14" y="22" font-size="20">🍜</text>
      <text x="44" y="24" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="white">Ichiran Ramen</text>
      <text x="44" y="38" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Tonkotsu Ramen</text>
      <rect x="160" y="14" width="42" height="18" rx="9" fill="#22c55e"/>
      <text x="167" y="27" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="white">★ 4.5</text>
      <text x="14" y="62" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="white">¥260</text>
      <text x="48" y="62" font-family="-apple-system, sans-serif" font-size="9" fill="#888">/person  ·  7.3km</text>
      <text x="14" y="74" font-family="-apple-system, sans-serif" font-size="9" fill="#22c55e">Great Value</text>
    </g>

    <!-- Restaurant card 3 -->
    <g transform="translate(16, 278)">
      <rect width="208" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
      <text x="14" y="22" font-size="20">🍢</text>
      <text x="44" y="24" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="white">Torikizoku</text>
      <text x="44" y="38" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Yakitori</text>
      <rect x="160" y="14" width="42" height="18" rx="9" fill="#22c55e"/>
      <text x="167" y="27" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="white">★ 5.0</text>
      <text x="14" y="62" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="white">¥370</text>
      <text x="48" y="62" font-family="-apple-system, sans-serif" font-size="9" fill="#888">/person  ·  3.5km</text>
      <text x="14" y="74" font-family="-apple-system, sans-serif" font-size="9" fill="#22c55e">Great Value</text>
    </g>
  </g>
</svg>
