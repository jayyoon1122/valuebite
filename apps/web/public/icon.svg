<!-- RYOTEI Final v5 — fixes:
     1. Chopsticks share bottom pivot, clear V (25° each = 50° opening)
     2. Steam = wavy/curling lines that taper at top, like real steam vapor
     3. Inside bowl shows REAL ramen: noodles, nori sheet, soft egg, scallions, chashu
     4. Rim highlight is ON the rim edge only (above the broth), no white line on food -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3a2e"/>
      <stop offset="100%" stop-color="#04211a"/>
    </linearGradient>
    <linearGradient id="bowlOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf5"/>
      <stop offset="60%" stop-color="#d6d4c8"/>
      <stop offset="100%" stop-color="#7d7a6e"/>
    </linearGradient>
    <radialGradient id="brothG" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#5a2d0a"/>
    </radialGradient>
    <linearGradient id="chop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b576"/>
      <stop offset="100%" stop-color="#7c4a1e"/>
    </linearGradient>
    <linearGradient id="steamG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#86efac" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#86efac" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="yolk" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle warm restaurant glow -->
  <radialGradient id="warm" cx="0.5" cy="0.65" r="0.5">
    <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#warm)"/>

  <!-- ═══ STEAM — natural curling vapor, tapered, multi-layer ═══ -->
  <g stroke="url(#steamG)" stroke-linecap="round" fill="none">
    <!-- Wisp 1 (left) — wavy, tapers from thick to thin going up -->
    <path d="M 200 130 C 218 110, 184 90, 200 70 C 215 55, 192 40, 205 20" stroke-width="9"/>
    <path d="M 200 125 C 215 108, 188 92, 200 75 C 213 60, 196 45, 207 28" stroke-width="5" opacity="0.6"/>
    <!-- Wisp 2 (center, tallest) -->
    <path d="M 256 120 C 272 95, 240 80, 256 55 C 270 35, 246 20, 258 0" stroke-width="10"/>
    <path d="M 256 115 C 270 95, 242 82, 256 60 C 268 40, 250 25, 260 8" stroke-width="6" opacity="0.6"/>
    <!-- Wisp 3 (right) -->
    <path d="M 312 130 C 294 110, 328 90, 312 70 C 297 55, 320 40, 307 20" stroke-width="9"/>
    <path d="M 312 125 C 297 108, 324 92, 312 75 C 299 60, 316 45, 305 28" stroke-width="5" opacity="0.6"/>
  </g>
  <!-- Tiny steam puffs (small soft circles) -->
  <g fill="#86efac" opacity="0.3">
    <circle cx="195" cy="35" r="6"/>
    <circle cx="260" cy="15" r="7"/>
    <circle cx="315" cy="35" r="6"/>
    <circle cx="225" cy="55" r="4"/>
    <circle cx="290" cy="50" r="5"/>
  </g>

  <!-- ═══ CHOPSTICKS — share bottom pivot at (256, 305), clear V ═══ -->
  <!-- Bottom of each chopstick is at the pivot; tops spread to form V -->
  <g transform="translate(256, 305) rotate(-25)">
    <!-- Rect goes from y=-220 (top) to y=0 (bottom = pivot) -->
    <rect x="-10" y="-220" width="20" height="220" rx="9" fill="url(#chop)"/>
    <!-- Tip highlight (top of chopstick = thin/sharp end) -->
    <ellipse cx="0" cy="-218" rx="10" ry="3" fill="#fef3c7" opacity="0.5"/>
  </g>
  <g transform="translate(256, 305) rotate(25)">
    <rect x="-10" y="-220" width="20" height="220" rx="9" fill="url(#chop)"/>
    <ellipse cx="0" cy="-218" rx="10" ry="3" fill="#fef3c7" opacity="0.5"/>
  </g>

  <!-- ═══ BOWL — proper donburi anatomy ═══ -->
  <!-- Outer body -->
  <path d="
    M 76 320
    C 76 355, 86 392, 110 420
    C 145 465, 200 478, 256 478
    C 312 478, 367 465, 402 420
    C 426 392, 436 355, 436 320
    Z
  " fill="url(#bowlOuter)"/>

  <!-- Wall shadow on lower-right (3D depth) -->
  <path d="M 256 478 C 380 470, 426 430, 432 360" stroke="#52524a" stroke-width="6" fill="none" opacity="0.25"/>

  <!-- Decorative rings on lower bowl (Japanese ceramic) -->
  <ellipse cx="256" cy="445" rx="148" ry="14" fill="none" stroke="#0f3a2e" stroke-width="3" opacity="0.4"/>
  <ellipse cx="256" cy="445" rx="146" ry="12" fill="none" stroke="#0f3a2e" stroke-width="2" opacity="0.25"/>

  <!-- Foot ring at base -->
  <ellipse cx="256" cy="481" rx="86" ry="9" fill="#3d3a32"/>
  <ellipse cx="256" cy="478" rx="84" ry="6" fill="#6b6859"/>

  <!-- ═══ TOP RIM (the ceramic edge thickness) ═══ -->
  <!-- Rim outer ellipse (bowl opening from 3/4 angle) -->
  <ellipse cx="256" cy="320" rx="180" ry="28" fill="url(#bowlOuter)"/>
  <!-- Rim outer edge (subtle dark line for ceramic thickness) -->
  <ellipse cx="256" cy="320" rx="180" ry="28" fill="none" stroke="#9b9888" stroke-width="2.5" opacity="0.6"/>

  <!-- ═══ INSIDE THE BOWL — visible through opening ═══ -->
  <!-- Dark inside (depth) — slightly LOWER than rim to show concavity -->
  <ellipse cx="256" cy="328" rx="166" ry="20" fill="#2d1b0c"/>
  <!-- Broth surface (rich golden) -->
  <ellipse cx="256" cy="328" rx="158" ry="16" fill="url(#brothG)"/>

  <!-- ═══ FOOD ON BROTH — actual ramen toppings ═══ -->
  <!-- Curly noodle strands (cream, drawn as curves) -->
  <g stroke="#fef3c7" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M 175 326 Q 200 322 220 328 Q 240 334 260 328"/>
    <path d="M 280 332 Q 300 328 320 332 Q 340 336 360 330"/>
    <path d="M 180 336 Q 210 332 230 338"/>
    <path d="M 290 322 Q 310 318 330 322"/>
  </g>

  <!-- Nori (seaweed) sheet — sticking up vertically from broth -->
  <g transform="rotate(-6 200 322)">
    <rect x="186" y="307" width="28" height="22" rx="2" fill="#1c1917"/>
    <rect x="188" y="309" width="3" height="20" fill="#3f3f3f" opacity="0.5"/>
  </g>

  <!-- Chashu (pork slice) — pinkish ellipse, slightly textured -->
  <ellipse cx="305" cy="326" rx="28" ry="8" fill="#d4a574"/>
  <ellipse cx="305" cy="324" rx="26" ry="6" fill="#e8c5a0"/>
  <!-- Chashu fat ring -->
  <ellipse cx="305" cy="326" rx="28" ry="8" fill="none" stroke="#a16207" stroke-width="1.5" opacity="0.6"/>

  <!-- Soft-boiled egg (ajitama) — half showing -->
  <g>
    <ellipse cx="225" cy="332" rx="18" ry="14" fill="#fafaf5"/>
    <ellipse cx="225" cy="332" rx="18" ry="14" fill="none" stroke="#a8a59a" stroke-width="1" opacity="0.5"/>
    <!-- Yolk -->
    <ellipse cx="225" cy="333" rx="11" ry="8" fill="url(#yolk)"/>
  </g>

  <!-- Scallion (green onion) bits — scattered green -->
  <g fill="#22c55e">
    <ellipse cx="170" cy="325" rx="6" ry="2" transform="rotate(-20 170 325)"/>
    <ellipse cx="345" cy="338" rx="7" ry="2" transform="rotate(35 345 338)"/>
    <ellipse cx="270" cy="338" rx="5" ry="1.8"/>
    <ellipse cx="195" cy="340" rx="6" ry="2" transform="rotate(15 195 340)"/>
    <ellipse cx="320" cy="320" rx="5" ry="1.8" transform="rotate(-10 320 320)"/>
  </g>
  <g fill="#86efac" opacity="0.85">
    <ellipse cx="248" cy="324" rx="5" ry="1.5" transform="rotate(-30 248 324)"/>
    <ellipse cx="290" cy="340" rx="5" ry="1.5" transform="rotate(20 290 340)"/>
  </g>
</svg>
